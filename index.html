<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark" />
    <title>One Still Point</title>
    <meta
      name="description"
      content="A scientifically grounded, GPU-accelerated, animated black hole visualizer."
    />
    <link rel="stylesheet" href="/src/style.css" />
    <!-- The intro's own stylesheet (moment of creation + splash + Replay melt), a
         self-contained unit alongside src/intro/overlay.html — see src/intro/README.md. -->
    <link rel="stylesheet" href="/src/intro/intro.css" />
  </head>
  <body>
    <noscript>
      One Still Point requires JavaScript and a WebGPU- or WebGL2-capable browser.
    </noscript>
    <!-- The instant-paint intro (black hold → test pattern → "moment of creation" →
         binary-merger splash, all sequenced by the inline window.__ospIntro). It lives
         in one place — src/intro/overlay.html — and the introOverlay() plugin in
         vite.config.ts inlines it here. Edit the overlay there. -->
    <!-- @osp-intro-overlay -->
    <!-- Defer the heavy engine bundle. Rather than a static `<script src>` that parses
         + executes the moment the HTML is done — starving the cheap CSS prelude's
         timers and the splash's first paint, which reordered the beats and opened a
         black gap before the merger — expose it as a dynamic import and let the inline
         splash call window.__ospBoot() once it's built + covering. The ~860KB parse +
         WebGPU compile then happen *under* the splash. (Vite code-splits main.ts into
         its own chunk and resolves this path in the build.) -->
    <script type="module">
      window.__ospBoot = function () {
        return import('/src/main.ts');
      };
    </script>
  </body>
</html>
