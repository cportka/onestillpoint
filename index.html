<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark" />
    <title>One Still Point</title>
    <meta
      name="description"
      content="A scientifically grounded, GPU-accelerated, animated black hole visualizer."
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <noscript>
      One Still Point requires JavaScript and a WebGPU- or WebGL2-capable browser.
    </noscript>
    <!-- Load splash: a JS-free black-and-white "formation" (a cluster of bodies
         spiralling inward to form the hole) that paints on first paint — before
         the bundle parses or the WebGPU shader compiles — then crossfades to the
         live scene once the first real frame is ready (see main.ts). -->
    <div id="osp-splash" aria-hidden="true">
      <div class="osp-splash__stage">
        <span class="osp-splash__ring"></span>
        <span class="osp-splash__core"></span>
        <!-- Bodies + dust of varied size (--s), start radius (--r), angle (--a), stagger (--d). -->
        <span class="osp-splash__b" style="--a: 8deg; --d: 0s; --s: 2.3vmin; --r: 41vmin"></span>
        <span class="osp-splash__b" style="--a: 58deg; --d: -0.05s; --s: 1.0vmin; --r: 33vmin"></span>
        <span class="osp-splash__b" style="--a: 112deg; --d: -0.12s; --s: 1.8vmin; --r: 45vmin"></span>
        <span class="osp-splash__b" style="--a: 156deg; --d: -0.03s; --s: 0.7vmin; --r: 30vmin"></span>
        <span class="osp-splash__b" style="--a: 202deg; --d: -0.09s; --s: 2.0vmin; --r: 38vmin"></span>
        <span class="osp-splash__b" style="--a: 248deg; --d: -0.15s; --s: 0.9vmin; --r: 35vmin"></span>
        <span class="osp-splash__b" style="--a: 294deg; --d: -0.06s; --s: 1.5vmin; --r: 43vmin"></span>
        <span class="osp-splash__b" style="--a: 336deg; --d: -0.10s; --s: 0.8vmin; --r: 31vmin"></span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
