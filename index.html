<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark" />
    <title>One Still Point</title>
    <meta
      name="description"
      content="A scientifically grounded, GPU-accelerated, animated black hole visualizer."
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <noscript>
      One Still Point requires JavaScript and a WebGPU- or WebGL2-capable browser.
    </noscript>
    <!-- Load splash: a JS-free black-and-white "formation" (a cluster of bodies
         spiralling inward to form the hole) that paints on first paint — before
         the bundle parses or the WebGPU shader compiles — then crossfades to the
         live scene once the first real frame is ready (see main.ts). -->
    <div id="osp-splash" aria-hidden="true">
      <div class="osp-splash__stage">
        <span class="osp-splash__pool"></span>
        <span class="osp-splash__core"></span>
      </div>
    </div>
    <!-- Generate the infalling cluster synchronously (before the module bundle),
         so the hundreds of dust points paint on first paint with everything else:
         2–4 big bodies, 5–10 medium, and many small dust, each with a randomized
         angle (--a), size (--s), start radius (--r), spiral (--w) and stagger (--d). -->
    <script>
      (function () {
        var core = document.querySelector('#osp-splash .osp-splash__core');
        if (!core) return;
        var R = function (a, b) { return a + Math.random() * (b - a); };
        function spawn(cls, n, sMin, sMax, rMin, rMax, dSpread) {
          var h = '';
          for (var i = 0; i < n; i++) {
            h +=
              '<i class="' + cls + '" style="--a:' + R(0, 360).toFixed(1) +
              'deg;--s:' + R(sMin, sMax).toFixed(2) + 'vmin;--r:' + R(rMin, rMax).toFixed(1) +
              'vmin;--w:' + R(110, 210).toFixed(0) + 'deg;--d:' + (-R(0, dSpread)).toFixed(3) + 's"></i>';
          }
          core.insertAdjacentHTML('beforebegin', h); // between the pool and the (top-most) core
        }
        spawn('osp-splash__b osp-splash__b--big', 2 + ((Math.random() * 3) | 0), 2.4, 3.8, 26, 42, 0.05);
        spawn('osp-splash__b', 5 + ((Math.random() * 6) | 0), 1.0, 2.0, 24, 46, 0.12);
        spawn('osp-splash__dust', 130, 0.28, 0.7, 18, 54, 0.18);
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
