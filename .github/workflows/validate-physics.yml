name: validate-physics

# The physics/maths validation scripts (geodesic · disk · orbit · lensing). They
# numerically cross-check the shader + integrator maths the renderer depends on, so
# they only need to run when that maths can actually change: the physics integrators,
# the TSL shader sources, the scene/orbits, or the validation scripts themselves.
# A pure UI / docs / CSS change skips this workflow entirely (it simply doesn't run).
#
# NOTE: keep the two `paths:` lists below in sync (push + pull_request).
on:
  push:
    branches: [main]
    paths:
      - 'src/physics/**'
      - 'src/render/tsl/**'
      - 'src/scene/**'
      - 'scripts/validate-*.mjs'
      - '.github/workflows/validate-physics.yml'
  pull_request:
    paths:
      - 'src/physics/**'
      - 'src/render/tsl/**'
      - 'src/scene/**'
      - 'scripts/validate-*.mjs'
      - '.github/workflows/validate-physics.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Physics validation
        run: npm run validate
