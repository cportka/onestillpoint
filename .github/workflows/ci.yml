name: CI

# Lint, typecheck, and unit tests. Runs on every push to main and on all pull
# requests. The physics/maths *validation scripts* run separately, in
# validate-physics.yml — only when physics or shader-maths files change — so a
# UI/docs/CSS change doesn't pay for the geodesic/orbit/lensing checks.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test
