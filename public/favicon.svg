<svg xmlns="http://www.w3.org/2000/svg" width="232" height="232" viewBox="0 0 232 232" role="img">
  <title>One Still Point — Ember Core · stars 03 Star Field</title>

  <defs>
    <radialGradient id="ec-globe" gradientUnits="userSpaceOnUse" cx="116" cy="116" r="190.3">
      <stop offset="0" stop-color="rgb(185,165,135)" stop-opacity="0.16"></stop>
      <stop offset="0.38" stop-color="rgb(185,165,135)" stop-opacity="0.058"></stop>
      <stop offset="0.66" stop-color="rgb(185,165,135)" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="ec-coreFill" gradientUnits="userSpaceOnUse" cx="116" cy="106.53" r="62.83">
      <stop offset="0" stop-color="#171717"></stop>
      <stop offset="0.7" stop-color="#000000"></stop>
    </radialGradient>

    <radialGradient id="ec-farFade" gradientUnits="userSpaceOnUse" cx="116" cy="116" r="51.04" spreadMethod="pad">
      <stop offset="0" stop-color="#000000"></stop>
      <stop offset="0.909" stop-color="#000000"></stop>
      <stop offset="1" stop-color="#ffffff"></stop>
    </radialGradient>
    <mask id="ec-farMask" maskUnits="userSpaceOnUse" x="0" y="0" width="232" height="232">
      <rect width="232" height="232" fill="url(#ec-farFade)"></rect>
    </mask>

    <linearGradient id="ec-taper" gradientUnits="userSpaceOnUse" x1="9.28" y1="0" x2="222.72" y2="0">
      <stop offset="0.23" stop-color="#000000"></stop>
      <stop offset="0.35" stop-color="#ffffff"></stop>
      <stop offset="0.65" stop-color="#ffffff"></stop>
      <stop offset="0.77" stop-color="#000000"></stop>
    </linearGradient>
    <mask id="ec-taperMask" maskUnits="userSpaceOnUse" x="0" y="0" width="232" height="232">
      <rect width="232" height="232" fill="url(#ec-taper)"></rect>
    </mask>
    <filter id="ec-blurOrbit" filterUnits="userSpaceOnUse" x="-20" y="-20" width="272" height="272"><feGaussianBlur stdDeviation="3.5"></feGaussianBlur></filter>
    <filter id="ec-blurHalo" filterUnits="userSpaceOnUse" x="-20" y="-20" width="272" height="272"><feGaussianBlur stdDeviation="4"></feGaussianBlur></filter>
    <filter id="ec-blurHaloIn" filterUnits="userSpaceOnUse" x="-20" y="-20" width="272" height="272"><feGaussianBlur stdDeviation="3"></feGaussianBlur></filter>
    <filter id="ec-blurEmber" filterUnits="userSpaceOnUse" x="-20" y="-20" width="272" height="272"><feGaussianBlur stdDeviation="6"></feGaussianBlur></filter>
    <filter id="ec-blurCut" filterUnits="userSpaceOnUse" x="-20" y="-20" width="272" height="272"><feGaussianBlur stdDeviation="1"></feGaussianBlur></filter>
    <filter id="ec-blurStar" filterUnits="userSpaceOnUse" x="-20" y="-20" width="272" height="272"><feGaussianBlur stdDeviation="1.8"></feGaussianBlur></filter>
  </defs>

  <circle cx="116" cy="116" r="134.56" fill="url(#ec-globe)"></circle>

  <g mask="url(#ec-farMask)">
    <g transform="rotate(-9 116 116)">
      <path d="M 10.83 116 A 105.17 25.44 0 0 1 221.17 116" fill="none" stroke="rgb(195,188,171)" stroke-opacity="0.48" stroke-width="3.1" filter="url(#ec-blurOrbit)"></path>
      <path d="M 10.83 116 A 105.17 25.44 0 0 1 221.17 116" fill="none" stroke="#c3bcab" stroke-width="3.1"></path>
    </g>
  </g>

  <circle cx="116" cy="116" r="40.44" fill="rgb(255,198,148)" fill-opacity="0.30" filter="url(#ec-blurEmber)"></circle>

  <circle cx="116" cy="116" r="39.44" fill="url(#ec-coreFill)"></circle>
  <circle cx="116" cy="116" r="39.94" fill="none" stroke="rgb(255,208,158)" stroke-opacity="0.6" stroke-width="1"></circle>

  <circle cx="116" cy="116" r="44.85" fill="none" stroke="#d2cab6" stroke-width="3.1" filter="url(#ec-blurHalo)"></circle>
  <circle cx="116" cy="116" r="41.5" fill="none" stroke="#d2cab6" stroke-opacity="0.55" stroke-width="3" filter="url(#ec-blurHaloIn)"></circle>
  <circle cx="116" cy="116" r="44.85" fill="none" stroke="#d2cab6" stroke-width="3.1"></circle>

  <g transform="rotate(-9 116 116)">
    <path d="M 10.83 116 A 105.17 25.44 0 0 0 221.17 116" fill="none" stroke="rgb(195,188,171)" stroke-opacity="0.48" stroke-width="3.1" filter="url(#ec-blurOrbit)"></path>
    <path d="M 10.83 116 A 105.17 25.44 0 0 0 221.17 116" fill="none" stroke="#000000" stroke-opacity="0.75" stroke-width="4.8" filter="url(#ec-blurCut)"></path>
    <path d="M 10.83 116 A 105.17 25.44 0 0 0 221.17 116" fill="none" stroke="#c3bcab" stroke-width="3.1"></path>
    <path d="M 10.83 116 A 105.17 25.44 0 0 0 221.17 116" fill="none" stroke="#c3bcab" stroke-width="4.65" mask="url(#ec-taperMask)"></path>
  </g>

  <g>
    <circle cx="34" cy="60" r="2.2" fill="rgb(255,210,166)" fill-opacity="0.22" filter="url(#ec-blurStar)"></circle>
    <circle cx="34" cy="60" r="1" fill="#ffd2a6" fill-opacity="0.65"></circle>
    <circle cx="196" cy="44" r="2.9" fill="rgb(255,210,166)" fill-opacity="0.26" filter="url(#ec-blurStar)"></circle>
    <circle cx="196" cy="44" r="1.3" fill="#ffd2a6" fill-opacity="0.8"></circle>
    <circle cx="176" cy="176" r="3.9" fill="rgb(255,243,227)" fill-opacity="0.3" filter="url(#ec-blurStar)"></circle>
    <circle cx="176" cy="176" r="1.8" fill="#fff3e3" fill-opacity="0.92"></circle>
  </g>
